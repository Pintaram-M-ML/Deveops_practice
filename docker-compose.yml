version: '3.8'

services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "4001:3001"
    environment:
      - PORT=3001
    networks:
      - microservices-network
    restart: unless-stopped

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "4002:3002"
    environment:
      - PORT=3002
    networks:
      - microservices-network
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "4003:3003"
    environment:
      - PORT=3003
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
    depends_on:
      - user-service
      - product-service
    networks:
      - microservices-network
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge

