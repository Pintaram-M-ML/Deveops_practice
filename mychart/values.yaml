# Default values for mychart - Microservices Configuration
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  imagePullSecrets: []

# Define all three microservices
services:
  userService:
    enabled: true
    name: user-service
    replicaCount: 1
    image:
      repository: pintaram369/user-service  # Change to your Docker registry/image
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3001
      targetPort: 3001
    env:
      - name: PORT
        value: "3001"
    livenessProbe:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 3001
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  productService:
    enabled: true
    name: product-service
    replicaCount: 1
    image:
      repository: pintaram369/product-service  # Change to your Docker registry/image
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3002
      targetPort: 3002
    env:
      - name: PORT
        value: "3002"
    livenessProbe:
      httpGet:
        path: /health
        port: 3002
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 3002
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  orderService:
    enabled: true
    name: order-service
    replicaCount: 1
    image:
      repository: pintaram369/order-service  # Change to your Docker registry/image
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3003
      targetPort: 3003
    env:
      - name: PORT
        value: "3003"
      - name: USER_SERVICE_URL
        value: "http://user-service:3001"
      - name: PRODUCT_SERVICE_URL
        value: "http://product-service:3002"
    livenessProbe:
      httpGet:
        path: /health
        port: 3003
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 3003
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  frontendService:
    enabled: true
    name: frontend
    replicaCount: 1
    image:
      repository: pintaram369/frontend  # Change to your Docker registry/image
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      type: NodePort  # Use NodePort or LoadBalancer for external access
      port: 8080
      targetPort: 8080
      nodePort: 30080  # Optional: specify a fixed NodePort (30000-32767)
    env:
      - name: PORT
        value: "8080"
    livenessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: microservices.local
      paths:
        # Frontend - must be last to avoid overriding API routes
        - path: /
          pathType: Prefix
          serviceName: frontend
          servicePort: 8080
        # API routes with rewrite
        - path: /api/users(/|$)(.*)
          pathType: Prefix
          serviceName: user-service
          servicePort: 3001
        - path: /api/products(/|$)(.*)
          pathType: Prefix
          serviceName: product-service
          servicePort: 3002
        - path: /api/orders(/|$)(.*)
          pathType: Prefix
          serviceName: order-service
          servicePort: 3003
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - microservices.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
